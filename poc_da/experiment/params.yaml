# @package _global_
#
# Data assimilation only on Aletsch Glacier.
# Optimizes ice thickness from observed velocities.
#

core:
  hardware:
    visible_gpus: [0]

defaults:
  - override /inputs:
    - local
  - override /processes:
    - data_assimilation
    - iceflow

inputs:
  local:
    filename: input.nc
    crop:
      xmin: 417049.75
      xmax: 430849.75
      ymin: 5137756.5
      ymax: 5158056.5

processes:
  iceflow:
    method: unified
    numerics:
      Nz: 4
      basis_vertical: Lagrange
    physics:
      init_slidingco: 0.04
      init_arrhenius: 90
    emulator:
      network:
        nb_layers: 10
        nb_out_filter: 32
        conv_ker_size: 3
    unified:
      mapping: network
      network:
        pretrained: false
        architecture: FNO2
      optimizer: adam
      nbit_init: 100
      nbit: 100
      retrain_freq: 50
      nbit_warmup: -1
      adam:
        lr: 1.0e-05
        lr_init: 2.5e-04

  data_assimilation:
    control_list:
      - thk
    cost_list:
      - velsurf
      - icemask
    optimization:
      nbitmax: 2000
      step_size: 0.9
      retrain_iceflow_model: true
      fix_opti_normalization_issue: true
      obstacle_constraint: ['reproject']
      step_size_decay: 0.95
      pertubate: True
    fitting:
      velsurfobs_std: 2.1
    regularization:
      thk: 100.0
      smooth_anisotropy_factor: 1.0
      convexity_weight: 0.0
      to_regularize: thk
    scaling:
      thk: 1
    output:
      plot2d_live: false
      save_result_in_ncdf: geology-optimized.nc
      save_iterat_in_ncdf: true
      vars_to_save:
        - usurf
        - thk
        - slidingco
        - velbase_mag
        - velsurf_mag
        - velsurfobs_mag
        - divflux
        - icemask
        - arrhenius
