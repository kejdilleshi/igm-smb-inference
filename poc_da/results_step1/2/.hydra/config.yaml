cwd: ${get_cwd:0}
core:
  url_data: ''
  folder_data: data
  logging_file: ''
  logging: false
  tf_logging_level: WARNING
  igm_logging_level: WARNING
  hardware:
    gpu_info: false
    visible_gpus:
    - 0
    strategy: none
    profile: false
  print_params: false
  print_comp: false
  print_info: true
  print_imported_modules: false
  check_compat_params: true
  structure:
    root_foldername: user
    conf_foldername: conf
    code_foldername: code
    input_modules_foldername: inputs
    process_modules_foldername: processes
    output_modules_foldername: outputs
processes:
  data_assimilation:
    store_freq: 100
    control_list:
    - thk
    cost_list:
    - velsurf
    - icemask
    variables:
    - name: thk
      transform: identity
    - name: slidingco
      transform: identity
    - name: arrhenius
      transform: identity
    optimizer: ADAM
    optimization:
      nbitmin: 50
      nbitmax: 600
      step_size: 0.9
      step_size_decay: 0.95
      init_zero_thk: false
      sole_mask: false
      retrain_iceflow_model: true
      fix_opti_normalization_issue: true
      method: ADAM
      obstacle_constraint:
      - reproject
      optimizer_clipnorm: 10000000.0
      optimizer_epsilon: 1.0e-07
      pertubate: true
      nb_relaxation_steps: 0
      patience: 0
    regularization:
      thk: 10
      thk_version: 1
      thk_2nd_der: 1000000.0
      thk_1st_der: 100.0
      abl_acc_balance: 1.0
      slidingco: 1.0
      arrhenius: 10.0
      divflux: 1.0
      smooth_anisotropy_factor: 1.0
      smooth_anisotropy_factor_sl: 1.0
      smooth_anisotropy_var: vel
      convexity_weight: 0.0
      convexity_power: 1.3
      to_regularize: thk
    fitting:
      usurfobs_std: 2.0
      velsurfobs_std: 2.1
      thkobs_std: 3.0
      divfluxobs_std: 1.0
      volobsprop_std: 0.1
      uniformize_thkobs: true
      include_low_speed_term: false
      velsurfobs_thr: 0.0
      log_slidingco: false
    divflux:
      method: upwind
      force_zero_sum: false
    scaling:
      thk: 1
      usurf: 0.5
      slidingco: 0.0001
      arrhenius: 0.1
    output:
      freq: 50
      plot2d_live: false
      plot2d: true
      save_result_in_ncdf: geology-optimized.nc
      save_iterat_in_ncdf: true
      editor_plot2d: vs
      vars_to_save:
      - usurf
      - thk
      - slidingco
      - velbase_mag
      - velsurf_mag
      - velsurfobs_mag
      - divflux
      - icemask
      - arrhenius
    cook:
      infer_params: false
      tidewater_glacier: false
      vol_std: 1000.0
  iceflow:
    method: unified
    do_pretraining: false
    force_max_velbar: 0.0
    physics:
      energy_components:
      - viscosity
      - gravity
      - sliding
      sliding:
        law: weertman
        weertman:
          regu: 1.0e-10
          exponent: 3.0
          u_ref: 1.0
        coulomb:
          regu: 1.0e-10
          exponent: 3.0
          u_ref: 1.0
          mu: 0.4
        budd:
          regu: 1.0e-10
          exponent: 3.0
          u_ref: 1.0
          N_ref: 1.0
      gravity_cst: 9.81
      ice_density: 910.0
      water_density: 1000.0
      init_slidingco: 0.04
      init_arrhenius: 90
      enhancement_factor: 1.0
      exp_glen: 3.0
      regu_glen: 1.0e-05
      thr_ice_thk: 0.1
      min_sr: 1.0e-20
      max_sr: 1.0e+20
      force_negative_gravitational_energy: false
      cf_eswn: []
    numerics:
      precision: single
      ord_grad_u: l2_weighted
      ord_grad_theta: l2_weighted
      Nz: 4
      vert_spacing: 4.0
      basis_horizontal: central
      basis_vertical: Lagrange
    solver:
      step_size: 1.0
      nbitmax: 100
      optimizer: adam
      print_cost: false
      fieldin:
      - thk
      - usurf
      - arrhenius
      - slidingco
      - dX
    emulator:
      fieldin:
      - thk
      - usurf
      - arrhenius
      - slidingco
      - dX
      retrain_freq: 10
      print_cost: false
      lr: 2.0e-05
      lr_init: 0.0001
      lr_decay: 0.95
      warm_up_it: -10000000000.0
      nbit_init: 1
      nbit: 1
      framesizemax: 750
      split_patch_method: sequential
      pretrained: true
      name: ''
      save_model: false
      exclude_borders: 0
      optimizer: Adam
      optimizer_clipnorm: 1.0
      optimizer_epsilon: 1.0e-07
      save_cost: ''
      output_directory: ''
      plot_sol: false
      pertubate: false
      network:
        architecture: cnn
        multiple_window_size: 0
        activation: LeakyReLU
        nb_layers: 10
        nb_blocks: 4
        nb_out_filter: 32
        conv_ker_size: 3
        dropout_rate: 0.0
        weight_initialization: glorot_uniform
        cnn3d_for_vertical: false
        batch_norm: false
        l2_reg: 0.0
        separable: false
        residual: true
    diagnostic:
      save_freq: 1
      filename_metrics: diagnostic_metrics.txt
    unified:
      mapping: network
      bcs: []
      bc:
        dirichlet:
          left: 0
          right: 0
          top: 0
          bottom: 0
      optimizer: adam
      nbit: 100
      nbit_init: 100
      nbit_warmup: -1
      retrain_freq: 50
      adam:
        lr: 1.0e-05
        lr_init: 0.00025
        lr_decay: 1.0
        lr_decay_steps: 1000
        optimizer_clipnorm: 1.0
      lbfgs:
        memory: 10
        alpha_min: 0.0
      cg_newton:
        cg_tol: 1.0e-10
        cg_max_iter: 100
        truncated: true
      hessian:
        damping: 1.0e-06
      sequential:
        stages: []
      line_search: hager-zhang
      inputs:
      - thk
      - usurf
      - arrhenius
      - slidingco
      - dX
      normalization:
        method: adaptive
        fixed:
          inputs_offsets:
            thk: 0.0
            usurf: 0.0
            arrhenius: 0.0
            slidingco: 0.0
            dX: 0.0
            X: 0.0
            'Y': 0.0
          inputs_variances:
            thk: 1.0
            usurf: 1.0
            arrhenius: 1.0
            slidingco: 1.0
            dX: 1.0
            X: 1.0
            'Y': 1.0
      network:
        debug_mode: false
        debug_freq: 100
        pretrained: false
        pretrained_path: ''
        print_summary: false
        old_format: false
        output_scale: 1.0
        architecture: FNO2
      data_preparation:
        patch_size: 1000
        overlap: 0.0
        batch_size: 1
        rotation_probability: 0.0
        flip_probability: 0.0
        noise_type: none
        noise_scale: 0.0
        target_samples: 1
      halt:
        freq: 1
        success: []
        failure: []
        criteria:
          rel_tol:
            tol: 0.001
            ord: l2
          abs_tol:
            tol: 0.001
            ord: l2_weighted
          patience:
            patience: 100
          'inf': {}
          'nan': {}
        metrics:
          theta: {}
          u: {}
          cost: {}
          grad_u_norm: {}
          grad_theta_norm: {}
      display:
        print_cost: false
        print_cost_freq: 1
inputs:
  local:
    type: netcdf
    filename: input.nc
    coarsening:
      boundary: trim
      ratio: 1.0
    crop:
      xmin: 417049.75
      xmax: 430849.75
      ymin: 5137756.5
      ymax: 5158056.5
    icemask:
      include: false
      shapefile: icemask.shp
      invert: false
