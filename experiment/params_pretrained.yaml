# @package _global_
#
# SMB inference on Aletsch Glacier using a pretrained CNN emulator.
# No data_assimilation step — the pretrained gelu_32x64x5 emulator
# (Nz=2, MOLHO, inputs: thk/usurf/slidingco) is loaded directly
# from the IGM artifact directory.
#
# The observation target is the thickness from state.thk (loaded from input.nc).
# The pretrained emulator is loaded directly by smb_inference — no iceflow
# process needed.
#

core:
  hardware:
    visible_gpus: [0]

defaults:
  - /user/conf/processes@processes.smb_inference: smb_inference
  - override /inputs:
    - local
  - override /processes:
    - smb_inference

inputs:
  local:
    filename: input.nc
    crop:
      xmin: 417049.75
      xmax: 430849.75
      ymin: 5137756.5
      ymax: 5158056.5

processes:
  smb_inference:
    t_start: 2000.0
    ttot: 2020.0
    dtmax: 1.0
    cfl: 0.2
    emulator:
      from_state: false
      model_path: /home/klleshi/igm/igm/processes/iceflow/emulate/emulators/gelu_32x64x5
    observations:
      state_variable: thk
    inversion:
      method: profile
      dz: 200.0
      smb_init_low: -10.0
      smb_init_high: 3.0
    optimization:
      nbitmax: 100
      learning_rate: 0.05
      regularisation: 0.05
      early_stop_patience: 20
      early_stop_threshold: 1.0e-5
    output:
      vis_freq: 5.0
      visualize: false
      outdir: ./results/smb_inference_pretrained
      plot_loss: true
      save_results: true
