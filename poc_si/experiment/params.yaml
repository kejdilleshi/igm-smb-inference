# @package _global_
#
# SMB inference only on Aletsch Glacier.
# Inverts for a 1D elevation-dependent SMB profile using pre-existing
# DA-optimized thickness and retrained FNO2 emulator from state.
# Requires a prior DA run to have populated the state.
#

core:
  hardware:
    visible_gpus: [0]

defaults:
  - override /inputs:
    - local
  - override /processes:
    - iceflow
    - smb_inference

inputs:
  local:
    filename: input.nc
    crop:
      xmin: 417049.75
      xmax: 430849.75
      ymin: 5137756.5
      ymax: 5158056.5

processes:
  iceflow:
    method: unified
    numerics:
      Nz: 4
      basis_vertical: Lagrange
    physics:
      init_slidingco: 0.04
      init_arrhenius: 90
    emulator:
      network:
        nb_layers: 10
        nb_out_filter: 32
        conv_ker_size: 3
    unified:
      mapping: network
      network:
        pretrained: false
        architecture: FNO2
      optimizer: adam
      nbit_init: 100
      nbit: 100
      retrain_freq: 50
      nbit_warmup: -1
      adam:
        lr: 1.0e-05
        lr_init: 2.5e-04

  smb_inference:
    t_start: 2000.0
    ttot: 2020.0
    dtmax: 1.0
    cfl: 0.2
    emulator:
      from_state: true
    observations:
      state_variable: thkobs
    inversion:
      method: profile
      dz: 200.0
      smb_init_low: -10.0
      smb_init_high: 3.0
    optimization:
      nbitmax: 100
      learning_rate: 0.1
      regularisation: 0.1
      early_stop_patience: 50
      early_stop_threshold: 1.0e-5
      retrain_emulator_freq: 20
      early_retrain_iters: 5


    output:
      vis_freq: 5.0
      visualize: false
      outdir: ./smb_inference
      plot_loss: true
      save_results: true
